<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>FastAPI MLX Chatbot</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; }
    textarea { width: 100%; height: 120px; }
    button { padding: 10px 16px; margin-top: 8px; }
    pre { background: #f4f4f4; padding: 16px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>FastAPI + MLX-LM Chatbot</h1>
  <textarea id="message" placeholder="질문을 입력하세요"></textarea><br>
  <button onclick="sendChat()">전송</button>
  <h3>응답</h3>
  <pre id="result"></pre>

  <script>
    async function sendChat() {
      const message = document.getElementById("message").value;
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message})
      });
      const data = await res.json();
      document.getElementById("result").textContent = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
